<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cash Drops · 现金空投 — Book Reader</title>
  <!-- Import Outfit and Inter fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #090c15;
      --bg-light: #141929;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-cyan: #37ebf3;
      --accent-green: #10b981;
      --accent-purple: #a855f7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: radial-gradient(circle at 50% 50%, var(--bg-light) 0%, var(--bg-dark) 100%);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 35%, var(--accent-green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .sub {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 300;
      margin-bottom: 8px;
    }

    header .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.8;
    }

    /* Book container */
    .book {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .page {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      padding: 28px;
      min-height: 480px;
      align-items: center;
    }

    .art-container {
      position: relative;
      width: 100%;
      min-height: 350px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .art-img {
      max-width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .art-img.loaded {
      opacity: 1;
    }

    /* Loading Spinner */
    .spinner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--accent-green);
      animation: spin 1s ease-in-out infinite;
      z-index: 10;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .captions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
      padding-top: 20px;
    }

    .cap-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--accent-green);
    }

    .cap-block {
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border-left: 3px solid var(--accent-purple);
    }

    .en {
      font-size: 0.95rem;
      line-height: 1.5;
      font-weight: 400;
      margin-bottom: 6px;
      color: #fff;
    }

    .zh {
      font-size: 0.9rem;
      line-height: 1.5;
      font-weight: 300;
      color: var(--text-muted);
      font-style: italic;
    }

    .num {
      font-weight: 600;
      color: var(--accent-green);
      margin-right: 6px;
    }

    /* Navigation */
    .nav {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid var(--card-border);
    }

    .btn {
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover:not([disabled]) {
      background: var(--accent-green);
      border-color: var(--accent-green);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
      transform: translateY(-2px);
    }

    .btn:active:not([disabled]) {
      transform: translateY(0);
    }

    .btn[disabled] {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .nav-info {
      text-align: center;
    }

    #pageNum {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      display: block;
      margin-bottom: 2px;
    }

    .hint {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 300;
    }

    .index-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s ease;
    }

    .index-link:hover {
      opacity: 0.8;
    }

    @media (min-width: 768px) {
      .page {
        grid-template-columns: 1.2fr 1fr;
        align-items: stretch;
      }
      .captions {
        border-top: none;
        border-left: 1px dashed rgba(255, 255, 255, 0.1);
        padding: 0 0 0 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>💵 Cash Drops · 现金空投</h1>
      <p class="sub">A new comic by Andy — bilingual, page-by-page. ｜ 安迪的新漫画——中英文逐页对照阅读。</p>
      <p class="meta"><strong>Published / 出版日期:</strong> 2025-10-12</p>
    </header>

    <div class="book" aria-live="polite">
      <div id="page" class="page">
        <div class="art-container">
          <div id="spinner" class="spinner"></div>
          <img id="bookImage" class="art-img" src="" alt="Page Art">
        </div>
        <div class="captions">
          <h2 id="capTitle" class="cap-title"></h2>
          <div id="capList"></div>
        </div>
      </div>

      <div class="nav">
        <button id="prev" class="btn" aria-label="Previous page">⟵ Prev</button>
        <div class="nav-info">
          <span id="pageNum">Page -- / --</span>
          <span class="hint">Tip: ← / → keys or swipe to flip page</span>
        </div>
        <button id="next" class="btn" aria-label="Next page">Next ⟶</button>
      </div>
    </div>

    <p style="text-align:center;margin:24px 0 0;">
      <a class="index-link" href="../../index.html">⬅ Back to homepage · 返回首页</a>
    </p>
  </div>

  <script>
    const PAGES = [
      {
        img: "page-1.jpg",
        title: { en: "Cover", zh: "封面" },
        blocks: []
      },
      {
        img: "page-2.jpg",
        title: { en: "Page 2", zh: "第2页" },
        blocks: [
          { en: "Once a guy pushed a button. Then cash drops fell from the sky.",
            zh: "有一天，一个人按下了一个按钮。然后现金从天而降。" },
          { en: "So he started searching to find where the cash drops were made.",
            zh: "于是他开始寻找这些现金空投是在哪里制造的。" },
          { en: "He arrived at the military and thought they were made there.",
            zh: "他来到军营，以为这些现金是在那里制造的。" }
        ]
      },
      {
        img: "page-3.jpg",
        title: { en: "Page 3", zh: "第3页" },
        blocks: [
          { en: "He searched many places and became very tired.",
            zh: "他到处寻找，非常疲惫。" },
          { en: "So he went back home and slept for seventeen hours!",
            zh: "于是他回家睡觉，一睡就是十七个小时！" }
        ]
      },
      {
        img: "page-4.jpg",
        title: { en: "Page 4", zh: "第4页" },
        blocks: [
          { en: "When he woke up, he left the house and started searching again.",
            zh: "醒来后，他走出房子，又继续寻找。" },
          { en: "Then his friend came over. “What are you doing?”",
            zh: "这时朋友过来了：“你在干什么？”" },
          { en: "“I'm searching where the cash drops are from. Can I help?” — “Yes!”",
            zh: "“我在找现金空投从哪里来。”“我可以帮你吗？”——“当然可以！”" }
        ]
      },
      {
        img: "page-5.jpg",
        title: { en: "Page 5", zh: "第5页" },
        blocks: [
          { en: "They searched together. But wait—what is this?",
            zh: "他们一起寻找。等等——这是什么？" },
          { en: "They arrived at the military base again.",
            zh: "他们又来到了军营。" },
          { en: "“Why are you here?” asked the soldiers.",
            zh: "士兵问：“你们为什么在这里？”" }
        ]
      },
      {
        img: "page-6.jpg",
        title: { en: "Page 6", zh: "第6页" },
        blocks: [
          { en: "“Do you know about the cash drops?” asked the boy.",
            zh: "男孩问：“你们知道现金空投的事吗？”" },
          { en: "“Yes, now we know,” said the soldiers. The End.",
            zh: "“知道了，现在我们都明白了。”士兵说。——结束。" }
        ]
      }
    ];

    const imgEl = document.getElementById('bookImage');
    const spinnerEl = document.getElementById('spinner');
    const titleEl = document.getElementById('capTitle');
    const listEl = document.getElementById('capList');
    const pageNumEl = document.getElementById('pageNum');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');

    let i = 0;
    const preloadedImages = {};

    function preload(index) {
      [index - 1, index + 1].forEach(idx => {
        if (idx >= 0 && idx < PAGES.length && !preloadedImages[idx]) {
          const img = new Image();
          img.src = PAGES[idx].img;
          preloadedImages[idx] = img;
        }
      });
    }

    function render() {
      const p = PAGES[i];
      
      titleEl.textContent = `${p.title.en} · ${p.title.zh}`;
      listEl.innerHTML = p.blocks.map((b, idx) => `
        <div class="cap-block">
          <p class="en"><span class="num">${idx+1}.</span>${b.en}</p>
          <p class="zh"><span class="num">${idx+1}.</span>${b.zh}</p>
        </div>
      `).join('');
      
      pageNumEl.textContent = `Page ${i+1} / ${PAGES.length}`;
      prevBtn.disabled = i === 0;
      nextBtn.disabled = i === PAGES.length - 1;

      spinnerEl.style.display = 'block';
      imgEl.classList.remove('loaded');
      
      imgEl.src = p.img;
      imgEl.onload = () => {
        spinnerEl.style.display = 'none';
        imgEl.classList.add('loaded');
      };
      
      preload(i);
    }

    prevBtn.addEventListener('click', () => { if(i > 0) { i--; render(); } });
    nextBtn.addEventListener('click', () => { if(i < PAGES.length - 1) { i++; render(); } });
    
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' && i > 0) prevBtn.click();
      if (e.key === 'ArrowRight' && i < PAGES.length - 1) nextBtn.click();
    });

    let x0 = null;
    const pageContainer = document.getElementById('page');
    pageContainer.addEventListener('touchstart', e => {
      x0 = e.touches[0].clientX;
    }, {passive: true});

    pageContainer.addEventListener('touchend', e => {
      if (x0 === null) return;
      const dx = e.changedTouches[0].clientX - x0;
      if (Math.abs(dx) > 40) {
        if (dx < 0 && i < PAGES.length - 1) nextBtn.click();
        else if (dx > 0 && i > 0) prevBtn.click();
      }
      x0 = null;
    });

    render();
  </script>
</body>
</html>
